apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: task-queue
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "/etc/prometheus/alert-rules.yaml"

    scrape_configs:
      - job_name: 'kubernetes-service-endpoints'
        kubernetes_sd_configs:
        - role: endpoints
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
          action: replace
          target_label: __address__
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_service_name]
          action: replace
          target_label: kubernetes_service
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: kubernetes_pod

  alert-rules.yaml: |
    groups:
      - name: task-queue-alerts
        rules:
          - alert: APIInstanceDown
            expr: up{kubernetes_service="api"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "API Pod down"
              description: "API pod under service {{ $labels.kubernetes_service }} has been down for more than 1 minute."

          - alert: HighHTTP5xxErrorRate
            expr: sum(rate(taskqueue_http_requests_total{status_code=~"5.."}[1m])) / sum(rate(taskqueue_http_requests_total[1m])) * 100 > 5
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "High HTTP 5xx error rate"
              description: "HTTP 5xx error rate is {{ $value | printf \"%.2f\" }}% (greater than 5%)."

          - alert: HighAPILatency
            expr: histogram_quantile(0.95, sum(rate(taskqueue_http_request_duration_seconds_bucket[5m])) by (le)) > 0.5
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High API Latency"
              description: "95th percentile latency is {{ $value | printf \"%.2f\" }}s (greater than 0.5s)."

          - alert: QueueBuildUp
            expr: taskqueue_queue_depth > 100
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "Task queue build up"
              description: "Number of jobs in queue is {{ $value }} (greater than 100)."