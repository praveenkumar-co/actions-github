name: PR Quality Check

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./task-queue
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './task-queue/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier format check
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test:unit

  kubernetes-e2e:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Kind Cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: task-queue-cluster
          config: task-queue/kind/kind-config.yaml

      - name: Deploy to Kubernetes
        run: |
          cd task-queue
          chmod +x kind/setup.sh
          ./kind/setup.sh

      - name: Verify Kubernetes Deployment
        run: |
          cd task-queue
          chmod +x kind/verify.sh
          ./kind/verify.sh
      - name: Collect Kubernetes Logs
        if: failure()
        run: |
          kubectl get all -A
          kubectl describe pods -A
          kubectl logs -A --all-containers=true || true
