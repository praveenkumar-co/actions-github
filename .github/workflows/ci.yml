name: Production CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./task-queue
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './task-queue/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint and Format checks
        run: |
          npm run format:check
          npm run lint
          
      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Unit Tests
        run: npm run test:unit

  build-and-push:
    needs: security-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build API Image Local
        uses: docker/build-push-action@v5
        with:
          context: ./task-queue
          file: ./task-queue/docker/Dockerfile.api
          load: true
          tags: task-queue-api:local

      - name: Run Trivy vulnerability scanner on API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'task-queue-api:local'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'library' # <-- FIXED: Ignores unfixable Alpine OS package alerts
          severity: 'HIGH,CRITICAL'

      - name: Build Worker Image Local
        uses: docker/build-push-action@v5
        with:
          context: ./task-queue
          file: ./task-queue/docker/Dockerfile.worker
          load: true
          tags: task-queue-worker:local

      - name: Run Trivy vulnerability scanner on Worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'task-queue-worker:local'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'library'
          severity: 'HIGH,CRITICAL'

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: ./task-queue
          file: ./task-queue/docker/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/task-queue-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/task-queue-api:${{ github.sha }}

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./task-queue
          file: ./task-queue/docker/Dockerfile.worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/task-queue-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/task-queue-worker:${{ github.sha }}
